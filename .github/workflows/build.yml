name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller python-docx

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --onedir --windowed ^
            --name "SiksamitraEditor" ^
            --icon "icon.ico" ^
            --add-data "editor.html;." ^
            --add-data "styles.css;." ^
            --add-data "editor-quill.js;." ^
            --add-data "editor-main.js;." ^
            --add-data "sanskrit_rules.js;." ^
            --add-data "smdoc-format.js;." ^
            --add-data "custom-blots.js;." ^
            --add-data "document-manager.js;." ^
            --add-data "file-operations.js;." ^
            --add-data "modal-dialogs.js;." ^
            --add-data "theme-manager.js;." ^
            --add-data "pyqt-bridge.js;." ^
            --add-data "qwebchannel.js;." ^
            --add-data "icon-data.js;." ^
            --add-data "gentium_font_data_uri.txt;." ^
            --add-data "palladio_font_data_uri.txt;." ^
            --add-data "icon.ico;." ^
            --add-data "logo.png;." ^
            --add-data "transparent.png;." ^
            --add-data "about.html;." ^
            --add-data "requirements.txt;." ^
            --add-data "icons;icons" ^
            --add-data "lib;lib" ^
            --hidden-import "PyQt6.QtWebEngineWidgets" ^
            --hidden-import "PyQt6.QtWebChannel" ^
            --hidden-import "PyQt6.QtWebEngineCore" ^
            editor.py
        shell: cmd

      - name: Create NSIS installer script
        run: |
          @echo off
          (
          echo !include "MUI2.nsh"
          echo.
          echo Name "Sikshamitra Editor"
          echo OutFile "SiksamitraSetup.exe"
          echo InstallDir "$PROGRAMFILES\SiksamitraEditor"
          echo InstallDirRegKey HKLM "Software\SiksamitraEditor" "InstallDir"
          echo RequestExecutionLevel admin
          echo.
          echo !define MUI_ICON "icon.ico"
          echo !define MUI_UNICON "icon.ico"
          echo !define MUI_ABORTWARNING
          echo.
          echo !insertmacro MUI_PAGE_WELCOME
          echo !insertmacro MUI_PAGE_DIRECTORY
          echo !insertmacro MUI_PAGE_INSTFILES
          echo !insertmacro MUI_PAGE_FINISH
          echo !insertmacro MUI_UNPAGE_CONFIRM
          echo !insertmacro MUI_UNPAGE_INSTFILES
          echo !insertmacro MUI_LANGUAGE "English"
          echo.
          echo Section "Install"
          echo   SetOutPath $INSTDIR
          echo   File /r "dist\SiksamitraEditor\*.*"
          echo   WriteUninstaller "$INSTDIR\Uninstall.exe"
          echo   ; Start Menu
          echo   CreateDirectory "$SMPROGRAMS\Sikshamitra Editor"
          echo   CreateShortCut "$SMPROGRAMS\Sikshamitra Editor\Sikshamitra Editor.lnk" "$INSTDIR\SiksamitraEditor.exe" "" "$INSTDIR\SiksamitraEditor.exe"
          echo   CreateShortCut "$SMPROGRAMS\Sikshamitra Editor\Uninstall.lnk" "$INSTDIR\Uninstall.exe"
          echo   ; Desktop shortcut
          echo   CreateShortCut "$DESKTOP\Sikshamitra Editor.lnk" "$INSTDIR\SiksamitraEditor.exe" "" "$INSTDIR\SiksamitraEditor.exe"
          echo   ; .smdoc file association
          echo   WriteRegStr HKCR ".smdoc" "" "SiksamitraDocument"
          echo   WriteRegStr HKCR "SiksamitraDocument" "" "Sikshamitra Document"
          echo   WriteRegStr HKCR "SiksamitraDocument\shell\open\command" "" '"$INSTDIR\SiksamitraEditor.exe" "%%1"'
          echo   ; Uninstall registry
          echo   WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\SiksamitraEditor" "DisplayName" "Sikshamitra Editor"
          echo   WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\SiksamitraEditor" "UninstallString" "$INSTDIR\Uninstall.exe"
          echo   WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\SiksamitraEditor" "DisplayIcon" "$INSTDIR\SiksamitraEditor.exe"
          echo   WriteRegStr HKLM "Software\SiksamitraEditor" "InstallDir" "$INSTDIR"
          echo SectionEnd
          echo.
          echo Section "Uninstall"
          echo   RMDir /r "$INSTDIR"
          echo   RMDir /r "$SMPROGRAMS\Sikshamitra Editor"
          echo   Delete "$DESKTOP\Sikshamitra Editor.lnk"
          echo   DeleteRegKey HKCR ".smdoc"
          echo   DeleteRegKey HKCR "SiksamitraDocument"
          echo   DeleteRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\SiksamitraEditor"
          echo   DeleteRegKey HKLM "Software\SiksamitraEditor"
          echo SectionEnd
          ) > installer.nsi
        shell: cmd

      - name: Install NSIS
        run: |
          choco install nsis -y --no-progress
          echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi
        shell: pwsh

      - name: Also create portable ZIP
        run: Compress-Archive -Path "dist\SiksamitraEditor" -DestinationPath "SiksamitraEditor-Windows-Portable.zip"
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            SiksamitraSetup.exe
            SiksamitraEditor-Windows-Portable.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller python-docx

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --onedir --windowed \
            --name "SiksamitraEditor" \
            --add-data "editor.html:." \
            --add-data "styles.css:." \
            --add-data "editor-quill.js:." \
            --add-data "editor-main.js:." \
            --add-data "sanskrit_rules.js:." \
            --add-data "smdoc-format.js:." \
            --add-data "custom-blots.js:." \
            --add-data "document-manager.js:." \
            --add-data "file-operations.js:." \
            --add-data "modal-dialogs.js:." \
            --add-data "theme-manager.js:." \
            --add-data "pyqt-bridge.js:." \
            --add-data "qwebchannel.js:." \
            --add-data "icon-data.js:." \
            --add-data "gentium_font_data_uri.txt:." \
            --add-data "palladio_font_data_uri.txt:." \
            --add-data "logo.png:." \
            --add-data "transparent.png:." \
            --add-data "about.html:." \
            --add-data "requirements.txt:." \
            --add-data "icons:icons" \
            --add-data "lib:lib" \
            --hidden-import "PyQt6.QtWebEngineWidgets" \
            --hidden-import "PyQt6.QtWebChannel" \
            --hidden-import "PyQt6.QtWebEngineCore" \
            editor.py

      - name: Create DMG
        run: |
          mkdir -p dmg_contents
          cp -r dist/SiksamitraEditor.app dmg_contents/ 2>/dev/null || cp -r dist/SiksamitraEditor dmg_contents/
          hdiutil create -volname "SiksamitraEditor" -srcfolder dmg_contents -ov -format UDZO SiksamitraEditor-macOS.dmg 2>/dev/null || \
          tar -czf SiksamitraEditor-macOS.tar.gz -C dist SiksamitraEditor

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            SiksamitraEditor-macOS.dmg
            SiksamitraEditor-macOS.tar.gz

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller python-docx

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --onedir \
            --name "SiksamitraEditor" \
            --add-data "editor.html:." \
            --add-data "styles.css:." \
            --add-data "editor-quill.js:." \
            --add-data "editor-main.js:." \
            --add-data "sanskrit_rules.js:." \
            --add-data "smdoc-format.js:." \
            --add-data "custom-blots.js:." \
            --add-data "document-manager.js:." \
            --add-data "file-operations.js:." \
            --add-data "modal-dialogs.js:." \
            --add-data "theme-manager.js:." \
            --add-data "pyqt-bridge.js:." \
            --add-data "qwebchannel.js:." \
            --add-data "icon-data.js:." \
            --add-data "gentium_font_data_uri.txt:." \
            --add-data "palladio_font_data_uri.txt:." \
            --add-data "logo.png:." \
            --add-data "transparent.png:." \
            --add-data "about.html:." \
            --add-data "requirements.txt:." \
            --add-data "icons:icons" \
            --add-data "lib:lib" \
            --hidden-import "PyQt6.QtWebEngineWidgets" \
            --hidden-import "PyQt6.QtWebChannel" \
            --hidden-import "PyQt6.QtWebEngineCore" \
            editor.py

      - name: Create archive
        run: tar -czf SiksamitraEditor-Linux.tar.gz -C dist SiksamitraEditor

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: SiksamitraEditor-Linux.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List files
        run: ls -la *.exe *.zip *.dmg *.tar.gz 2>/dev/null || true

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          body: |
            Built from commit `${{ steps.sha.outputs.short }}` on `${{ github.ref_name }}`.

            **Windows (Installer):** `SiksamitraSetup.exe` — full installer with Start Menu, Desktop shortcut, .smdoc file association
            **Windows (Portable):** `SiksamitraEditor-Windows-Portable.zip` — extract and run, no installation needed
            **macOS:** `SiksamitraEditor-macOS.dmg` or `.tar.gz`
            **Linux:** `SiksamitraEditor-Linux.tar.gz` — extract and run `./SiksamitraEditor`
          files: |
            SiksamitraSetup.exe
            SiksamitraEditor-Windows-Portable.zip
            SiksamitraEditor-macOS.dmg
            SiksamitraEditor-macOS.tar.gz
            SiksamitraEditor-Linux.tar.gz
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-pages:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
