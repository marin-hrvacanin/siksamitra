<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Run Agent — śikṣāmitra</title>
    <script>
        (function() {
            try {
                var mode = '__SIKSAMITRA_INITIAL_THEME_MODE__';
                var stored = localStorage.getItem('siksamitra-theme') || '';
                var t = stored || mode || 'light';
                if (t === 'system') t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', t);
            } catch(e) {}
        })();
    </script>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; font-size: 14px; }
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 16px; }
        .settings-column {}
        .settings-section-title { font-size: 11px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .06em; margin: 12px 0 6px; }
        .settings-group { display: flex; flex-direction: column; gap: 4px; }
        .settings-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; display: block; }
        .modal-description { font-size: 12px; color: var(--text-secondary); margin: 0 0 14px; }
        .mt-4 { margin-top: 16px; }
        .auto-run-style-filters { border: 1px solid var(--border); border-radius: var(--radius-md); padding: 10px 14px; }
        .auto-run-style-filters legend { font-size: 11px; color: var(--text-secondary); padding: 0 4px; }
        .auto-run-style-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
        .auto-run-style-chip { display: inline-flex; align-items: center; gap: 5px; background: var(--bg-body); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 12px; cursor: pointer; user-select: none; }
        .auto-run-style-chip input { display: none; }
        .auto-run-style-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    </style>
</head>
<body class="popup-page">

<!-- Titlebar -->
<div class="popup-titlebar">
    <div class="popup-titlebar-title">
        <img src="logo.png" class="popup-titlebar-logo" alt="">
        Run Agent Settings
    </div>
    <button class="popup-titlebar-close" id="closeBtn" title="Close">✕</button>
</div>

<!-- Content -->
<div class="popup-content">
    <p class="modal-description">Configure the automation pipeline steps and filters.</p>

    <div class="settings-grid">
        <!-- Column 1 -->
        <div class="settings-column">
            <h3 class="settings-section-title">Standardization</h3>
            <div class="settings-group">
                <label class="switch-checkbox">
                    <input type="checkbox" data-setting="transliterate" checked>
                    <span class="switch-slider"><span class="switch-knob"></span></span>
                    <span class="switch-label">Transliterate (Dev → IAST)</span>
                </label>
                <label class="switch-checkbox">
                    <input type="checkbox" data-setting="standardize" checked>
                    <span class="switch-slider"><span class="switch-knob"></span></span>
                    <span class="switch-label">Standardize Characters</span>
                </label>
            </div>

            <h3 class="settings-section-title">Grammar &amp; Marks</h3>
            <div class="settings-group">
                <label class="switch-checkbox">
                    <input type="checkbox" data-setting="svarabhakti" checked>
                    <span class="switch-slider"><span class="switch-knob"></span></span>
                    <span class="switch-label">Svarabhakti</span>
                </label>
                <label class="switch-checkbox">
                    <input type="checkbox" data-setting="pauses" checked>
                    <span class="switch-slider"><span class="switch-knob"></span></span>
                    <span class="switch-label">Auto-Detect Pauses</span>
                </label>
                <label class="switch-checkbox">
                    <input type="checkbox" data-setting="holdings" checked>
                    <span class="switch-slider"><span class="switch-knob"></span></span>
                    <span class="switch-label">Holdings</span>
                </label>
                <label class="switch-checkbox">
                    <input type="checkbox" data-setting="anusvara" checked>
                    <span class="switch-slider"><span class="switch-knob"></span></span>
                    <span class="switch-label">Anusvara Rules</span>
                </label>
                <label class="switch-checkbox">
                    <input type="checkbox" data-setting="visarga" checked>
                    <span class="switch-slider"><span class="switch-knob"></span></span>
                    <span class="switch-label">Visarga Rules</span>
                </label>
            </div>
        </div>

        <!-- Column 2 -->
        <div class="settings-column">
            <h3 class="settings-section-title">Character Insertions</h3>
            <div class="settings-group">
                <label class="switch-checkbox">
                    <input type="checkbox" data-setting="insertJna" checked>
                    <span class="switch-slider"><span class="switch-knob"></span></span>
                    <span class="switch-label">Insert 'g' in jñ (j[g]ñ)</span>
                </label>
                <label class="switch-checkbox">
                    <input type="checkbox" data-setting="insertSv" checked>
                    <span class="switch-slider"><span class="switch-knob"></span></span>
                    <span class="switch-label">Insert 'u' in sv (s[u]v)</span>
                </label>
                <label class="switch-checkbox">
                    <input type="checkbox" data-setting="insertVy" checked>
                    <span class="switch-slider"><span class="switch-knob"></span></span>
                    <span class="switch-label">Insert 'u' in vy (v[u]y)</span>
                </label>
                <label class="switch-checkbox">
                    <input type="checkbox" data-setting="skipBija" checked>
                    <span class="switch-slider"><span class="switch-knob"></span></span>
                    <span class="switch-label">Skip bīja mantras (oṁ, hrīṁ, etc.)</span>
                </label>
            </div>

            <h3 class="settings-section-title">Configuration</h3>
            <div class="settings-group">
                <label class="settings-label">Text Source:</label>
                <div class="custom-dropdown modal-dropdown" id="sourceDropdown" data-value="yajurveda">
                    <div class="custom-dropdown-trigger">Yajurveda (Vedic anusvaras)</div>
                    <div class="custom-dropdown-menu">
                        <div class="custom-dropdown-option selected" data-value="yajurveda">Yajurveda (Vedic anusvaras)</div>
                        <div class="custom-dropdown-option" data-value="smriti">Smṛti (No Vedic anusvaras)</div>
                        <div class="custom-dropdown-option" data-value="rigveda">Ṛgveda (No Vedic anusvaras)</div>
                    </div>
                </div>
                <select id="sourceSelect" style="display:none">
                    <option value="yajurveda" selected>Yajurveda</option>
                    <option value="smriti">Smṛti</option>
                    <option value="rigveda">Ṛgveda</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Style Filters -->
    <fieldset class="auto-run-style-filters mt-4">
        <legend>Style Filters (click to toggle processing)</legend>
        <div class="auto-run-style-grid">
            <label class="auto-run-style-chip active" data-style="title"><span>Title</span></label>
            <label class="auto-run-style-chip active" data-style="subtitle"><span>Subtitle</span></label>
            <label class="auto-run-style-chip active" data-style="section"><span>Section</span></label>
            <label class="auto-run-style-chip active" data-style="subsection"><span>Subsection</span></label>
            <label class="auto-run-style-chip active" data-style="change"><span>Change</span></label>
            <label class="auto-run-style-chip" data-style="comment"><span>Comments</span></label>
            <label class="auto-run-style-chip" data-style="translation"><span>Translation</span></label>
        </div>
    </fieldset>
</div>

<!-- Footer -->
<div class="popup-footer">
    <span class="popup-footer-status" id="statusMsg"></span>
    <button type="button" id="saveBtn">Save Settings</button>
    <button type="button" id="runBtn" class="ribbon-btn" style="background:var(--primary);color:#fff;border-color:var(--primary)">Save &amp; Run Agent</button>
</div>

<script>
// ── Settings persistence key (matches editor-quill.js) ───────────────────────
const SETTINGS_KEY = 'siksamitra-auto-run-settings';

function getDefaultSettings() {
    return {
        transliterate: true, standardize: true, svarabhakti: true,
        pauses: true, holdings: true, anusvara: true, visarga: true,
        insertJna: true, insertSv: true, insertVy: true, skipBija: true,
        textSource: 'yajurveda',
        styleFilters: { title: true, subtitle: true, section: true,
                        subsection: true, change: true, comment: false, translation: false }
    };
}

// ── Read settings from localStorage ─────────────────────────────────────────
function loadSettings() {
    try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || getDefaultSettings(); }
    catch(e) { return getDefaultSettings(); }
}

// ── Apply settings to form checkboxes & dropdowns ───────────────────────────
function applyToForm(settings) {
    document.querySelectorAll('[data-setting]').forEach(cb => {
        cb.checked = !!settings[cb.dataset.setting];
        const slider = cb.closest('.switch-checkbox')?.querySelector('.switch-slider');
        if (slider) slider.classList.toggle('on', cb.checked);
    });
    // Source dropdown
    const src = settings.textSource || 'yajurveda';
    const dd = document.getElementById('sourceDropdown');
    dd.dataset.value = src;
    dd.querySelectorAll('.custom-dropdown-option').forEach(opt => {
        const sel = opt.dataset.value === src;
        opt.classList.toggle('selected', sel);
        if (sel) dd.querySelector('.custom-dropdown-trigger').textContent = opt.textContent;
    });
    // Style chips
    const sf = settings.styleFilters || {};
    document.querySelectorAll('[data-style]').forEach(chip => {
        const active = !!sf[chip.dataset.style];
        chip.classList.toggle('active', active);
    });
}

// ── Collect form state into settings object ──────────────────────────────────
function collectSettings() {
    const s = {};
    document.querySelectorAll('[data-setting]').forEach(cb => { s[cb.dataset.setting] = cb.checked; });
    s.textSource = document.getElementById('sourceDropdown').dataset.value || 'yajurveda';
    s.styleFilters = {};
    document.querySelectorAll('[data-style]').forEach(chip => {
        s.styleFilters[chip.dataset.style] = chip.classList.contains('active');
    });
    return s;
}

// ── Save settings to localStorage ───────────────────────────────────────────
function saveSettings() {
    const s = collectSettings();
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
    return s;
}

// ── Post action to main editor ───────────────────────────────────────────────
async function postAction(type, data) {
    try {
        await fetch('/api/dialog/action', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type, ...data })
        });
    } catch(e) { console.error('postAction error:', e); }
}

// ── Switch checkbox wiring (mirrors editor-quill pattern) ───────────────────
function wireSwitches() {
    document.querySelectorAll('.switch-checkbox input[type="checkbox"]').forEach(cb => {
        const slider = cb.closest('.switch-checkbox')?.querySelector('.switch-slider');
        if (!slider) return;
        // Initial state
        if (cb.checked) slider.classList.add('on');
        cb.addEventListener('change', () => slider.classList.toggle('on', cb.checked));
    });
}

// ── Custom dropdown ──────────────────────────────────────────────────────────
function wireDropdowns() {
    document.querySelectorAll('.custom-dropdown').forEach(dd => {
        const trigger = dd.querySelector('.custom-dropdown-trigger');
        const menu    = dd.querySelector('.custom-dropdown-menu');
        if (!trigger || !menu) return;
        trigger.addEventListener('click', (e) => {
            e.stopPropagation();
            menu.classList.toggle('open');
        });
        menu.querySelectorAll('.custom-dropdown-option').forEach(opt => {
            opt.addEventListener('click', () => {
                dd.dataset.value = opt.dataset.value;
                trigger.textContent = opt.textContent;
                menu.querySelectorAll('.custom-dropdown-option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                menu.classList.remove('open');
            });
        });
    });
    document.addEventListener('click', () => {
        document.querySelectorAll('.custom-dropdown-menu.open').forEach(m => m.classList.remove('open'));
    });
}

// ── Style chip toggles ───────────────────────────────────────────────────────
function wireChips() {
    document.querySelectorAll('[data-style]').forEach(chip => {
        chip.addEventListener('click', () => chip.classList.toggle('active'));
    });
}

// ── Init ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    wireSwitches();
    wireDropdowns();
    wireChips();
    applyToForm(loadSettings());

    document.getElementById('closeBtn').addEventListener('click', () => window.close());

    document.getElementById('saveBtn').addEventListener('click', async () => {
        saveSettings();
        const msg = document.getElementById('statusMsg');
        msg.textContent = 'Settings saved.';
        msg.className = 'popup-footer-status success';
        setTimeout(() => { msg.textContent = ''; msg.className = 'popup-footer-status'; }, 2000);
    });

    document.getElementById('runBtn').addEventListener('click', async () => {
        const settings = saveSettings();
        const msg = document.getElementById('statusMsg');
        msg.textContent = 'Sending to editor…';
        msg.className = 'popup-footer-status';
        await postAction('run_agent', { settings });
        msg.textContent = 'Agent queued — check editor.';
        msg.className = 'popup-footer-status success';
        setTimeout(() => { msg.textContent = ''; msg.className = 'popup-footer-status'; }, 3000);
    });
});
</script>
</body>
</html>
