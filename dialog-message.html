<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>śikṣāmitra</title>
    <script>
        (function() {
            try {
                var mode = '__SIKSAMITRA_INITIAL_THEME_MODE__';
                var stored = localStorage.getItem('siksamitra-theme') || '';
                var t = stored || mode || 'light';
                if (t === 'system') t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', t);
            } catch(e) {}
        })();
    </script>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; font-size: 14px; }
        .msg-body {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 20px 22px 16px;
            box-sizing: border-box;
            overflow: hidden;
        }
        .msg-header {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            margin-bottom: 10px;
        }
        .msg-icon {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .msg-icon.warning  { color: #f59e0b; }
        .msg-icon.error    { color: #ef4444; }
        .msg-icon.success  { color: #10b981; }
        .msg-icon.delete   { color: #ef4444; }
        .msg-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 4px 0 0;
            line-height: 1.3;
        }
        .msg-content {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.55;
            margin-bottom: 14px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .msg-body.savechanges .msg-content {
            flex: 0 0 auto;
            overflow: visible;
        }
        .msg-save-copy {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .msg-save-file {
            display: block;
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg-body);
            color: var(--text-primary);
            font-size: 13px;
            font-weight: 500;
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            box-sizing: border-box;
        }
        .msg-input {
            width: 100%;
            padding: 8px 10px;
            font-size: 13px;
            background: var(--bg-body);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: inherit;
            box-sizing: border-box;
            margin-bottom: 14px;
        }
        .msg-input:focus { outline: none; border-color: var(--primary); }
        .msg-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            flex-shrink: 0;
        }
        .msg-btn {
            padding: 7px 16px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-surface);
            color: var(--text-primary);
            cursor: pointer;
            font-family: inherit;
            min-width: 76px;
            line-height: 1.2;
            transition: background .15s, border-color .15s;
        }
        .msg-btn:hover { background: var(--bg-elevated); border-color: var(--primary); }
        .msg-btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
        .msg-btn.primary:hover { background: var(--accent); border-color: var(--accent); }
        .msg-btn.danger { background: #ef4444; color: #fff; border-color: #ef4444; }
        .msg-btn.danger:hover { background: #dc2626; border-color: #dc2626; }
        .msg-btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
    </style>
</head>
<body class="popup-page">

<div class="msg-body">
    <div class="msg-header">
        <div class="msg-icon" id="msgIcon"></div>
        <h3 class="msg-title" id="msgTitle">Notice</h3>
    </div>
    <div class="msg-content" id="msgContent"></div>
    <input type="text" class="msg-input" id="msgInput" hidden>
    <div class="msg-actions" id="msgActions"></div>
</div>

<script>
const ICONS = {
    info:    '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12.01" y2="8"></line><line x1="11" y1="12" x2="13" y2="12"></line><line x1="12" y1="12" x2="12" y2="16"></line></svg>',
    question:'<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9 9a3 3 0 0 1 6 0c0 1.5-1 2-2 2s-1 1-1 2"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>',
    error:   '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="9" y1="9" x2="15" y2="15"></line><line x1="15" y1="9" x2="9" y2="15"></line></svg>',
    warning: '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>',
    success: '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="m8 12 2.5 2.5L16 9"></path></svg>',
    prompt:  '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>',
    save:    '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 21h10a2 2 0 0 0 2-2V7.5L16.5 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2Z"></path><path d="M17 21V13H7v8"></path><path d="M7 3v5h8"></path></svg>',
    delete:  '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M5 6l1-3h12l1 3"></path></svg>'
};

let messageId = null;
let cancelValue = null;
let inputMode = false;
let buttons = [];

async function loadState() {
    try {
        const resp = await fetch('/api/message/state');
        const data = await resp.json();
        if (!data || !data.id) return;
        messageId = data.id;
        cancelValue = data.cancelValue;
        inputMode = data.type === 'prompt';
        buttons = Array.isArray(data.buttons) ? data.buttons : [{ label: 'OK', value: undefined, primary: true }];
        const isSaveChanges = data.type === 'savechanges';
        const displayName = data.filename || '';

        // Render
        const bodyEl = document.querySelector('.msg-body');
        bodyEl.classList.toggle('savechanges', isSaveChanges);

        document.getElementById('msgTitle').textContent = data.title || 'Notice';
        const contentEl = document.getElementById('msgContent');
        contentEl.innerHTML = '';
        if (isSaveChanges) {
            const copy = document.createElement('div');
            copy.className = 'msg-save-copy';
            copy.textContent = data.message || 'Save changes before closing?';

            const file = document.createElement('div');
            file.className = 'msg-save-file';
            file.textContent = displayName || 'Untitled.smdoc';
            file.title = displayName || 'Untitled.smdoc';

            contentEl.appendChild(copy);
            contentEl.appendChild(file);
        } else {
            contentEl.textContent = data.message || '';
        }
        const iconEl = document.getElementById('msgIcon');
        const iconKey = (data.icon || 'info').toLowerCase();
        iconEl.innerHTML = ICONS[iconKey] || ICONS.info;
        iconEl.className = 'msg-icon' + (['warning','error','success','delete'].includes(iconKey) ? ' ' + iconKey : '');

        const inp = document.getElementById('msgInput');
        if (inputMode) {
            inp.hidden = false;
            inp.value = data.defaultValue || '';
            setTimeout(() => {
                inp.focus();
                if (Array.isArray(data.selectRange) && data.selectRange.length === 2) {
                    try { inp.setSelectionRange(data.selectRange[0], data.selectRange[1]); }
                    catch(_) { inp.select(); }
                } else {
                    inp.select();
                }
            }, 50);
        } else {
            inp.hidden = true;
        }

        const actions = document.getElementById('msgActions');
        actions.innerHTML = '';
        buttons.forEach((b, i) => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'msg-btn' + (b.primary ? ' primary' : '') + (b.danger ? ' danger' : '');
            btn.textContent = b.label;
            btn.addEventListener('click', () => respond(b.value));
            actions.appendChild(btn);
            if (b.primary) setTimeout(() => btn.focus(), 60);
        });
        if (!buttons.some(b => b.primary)) {
            // focus the last button
            const last = actions.querySelector('button:last-child');
            if (last) setTimeout(() => last.focus(), 60);
        }

        // Set window title
        try { document.title = (data.title || 'Notice') + ' — śikṣāmitra'; } catch(_) {}
    } catch(e) {
        console.error('Failed to load message state', e);
    }
}

async function respond(value) {
    if (!messageId) { closeWin(); return; }
    // Resolve __INPUT__ to current input value
    if (value === '__INPUT__') value = document.getElementById('msgInput').value;
    try {
        await fetch('/api/dialog/action', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type: 'message_response', messageId, value }),
        });
    } catch(e) { console.error('respond failed', e); }
    messageId = null; // prevent double-respond
    closeWin();
}

async function closeWin() {
    try {
        if (window.pywebview?.api?.close_dialog) {
            await window.pywebview.api.close_dialog('message');
        } else {
            window.close();
        }
    } catch(e) { console.error(e); }
}

document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        e.preventDefault();
        // Find primary button or last
        let target = buttons.find(b => b.primary) || buttons[buttons.length - 1];
        if (target) {
            const v = target.value === '__INPUT__' ? document.getElementById('msgInput').value : target.value;
            respond(v);
        }
    } else if (e.key === 'Escape') {
        e.preventDefault();
        respond(cancelValue);
    }
});

document.addEventListener('DOMContentLoaded', loadState);
</script>
</body>
</html>
